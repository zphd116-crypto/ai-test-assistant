- id: TC001
  name: 查询文章 1 应返回 userId=1
  method: GET
  url: https://jsonplaceholder.typicode.com/posts/1
  assert_field: userId
  expected: 1

- id: TC002
  name: 查询用户 2 应返回 username=Antonette
  method: GET
  url: https://jsonplaceholder.typicode.com/users/2
  assert_field: username
  expected: Antonette

- id: TC003
  name: 创建文章应返回 userId=99
  method: POST
  url: https://jsonplaceholder.typicode.com/posts
  body:
    title: test
    body: ai test
    userId: 99
  assert_field: userId
  expected: 99

- id: TC004
